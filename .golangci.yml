run:
  timeout: 5m

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - gosimple
    - misspell
    - revive
    - gosec

issues:
  exclude-rules:
    # Tests may use weaker patterns than production code.
    - path: _test\.go
      linters:
        - gosec
