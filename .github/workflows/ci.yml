name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt check
        if: runner.os != 'Windows'
        run: |
          unformatted="$(gofmt -l cmd internal)"
          if [ -n "$unformatted" ]; then
            echo "gofmt: files need formatting:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64

  naming-gate:
    name: Naming gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Forbidden brand grep
        run: |
          # The reference implementation's brand must not appear in this
          # repository. The pattern is assembled from parts so this file
          # does not trip the gate itself.
          pattern="$(printf '%s%s' co coa)skill"
          if grep -riIn --exclude-dir=.git --exclude-dir=agents "$pattern" .; then
            echo "naming gate: forbidden brand found (pattern: $pattern)"
            exit 1
          fi
          echo "naming gate: clean"
