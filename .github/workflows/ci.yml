name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Checkout authoritative protocol suite
        uses: actions/checkout@v4
        with:
          repository: relux-works/curator-spec
          ref: e56074c33f1ecdf301f8a845ada41d5d832d1796
          path: protocol-spec

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: gofmt check
        if: runner.os != 'Windows'
        run: |
          unformatted="$(gofmt -l cmd internal)"
          if [ -n "$unformatted" ]; then
            echo "gofmt: files need formatting:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        env:
          CURATOR_CONFORMANCE_ROOT: ${{ github.workspace }}/protocol-spec/conformance/v1
        run: go test ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest

  interop:
    name: Interop conformance gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Checkout authoritative protocol suite
        uses: actions/checkout@v4
        with:
          repository: relux-works/curator-spec
          ref: e56074c33f1ecdf301f8a845ada41d5d832d1796
          path: protocol-spec

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Shared protocol suite
        env:
          CURATOR_CONFORMANCE_ROOT: ${{ github.workspace }}/protocol-spec/conformance/v1
        run: go test ./internal/interop/ -v

  naming-gate:
    name: Naming gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Alternative implementation name gate
        run: |
          # The alternative protocol implementation is referenced exactly
          # once: the README open-protocol section (one line carrying the
          # link). Zero matches anywhere else. The pattern is assembled from
          # parts so this file does not trip the gate itself.
          pattern="$(printf '%s%s' co coa)skill"
          if grep -riIn --exclude-dir=.git --exclude-dir=agents --exclude=README.md "$pattern" .; then
            echo "naming gate: name found outside README.md"
            exit 1
          fi
          lines=$(grep -ci "$pattern" README.md || true)
          if [ "$lines" != "1" ]; then
            echo "naming gate: README.md must mention the name on exactly one line, found $lines"
            exit 1
          fi
          echo "naming gate: clean (one README line)"
